<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一只小猫陪你定时站起来伸展，支持自定义间隔、语音提醒和浏览器通知。"
    />
    <title>小猫伸展提醒器</title>
    <meta name="theme-color" content="#fff1cf" />
    <link rel="icon" href="./assets/icon-timer-macos.png" />
    <link rel="apple-touch-icon" href="./assets/icon-timer-macos.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar" aria-label="应用信息">
          <a class="skip-link" href="#timer-controls">跳到计时器</a>
          <div class="brand-lockup">
            <span class="brand-icon icon-sprite icon-bell" aria-hidden="true"></span>
            <div>
              <strong>小猫伸展提醒器</strong>
              <span>到点就起身，回来继续专注</span>
            </div>
          </div>
          <div class="status-pill">
            <span class="pulse-dot" aria-hidden="true"></span>
            <span id="timer-state">准备开始</span>
          </div>
        </header>

        <section class="control-hero" id="timer-controls" aria-label="提醒器控制台">
          <div class="control-panel">
            <div class="control-copy">
              <div class="control-copy-top">
                <p class="kicker">现在开始守护</p>
                <button class="quick-reset-btn" id="reset-btn" type="button">重置</button>
              </div>
              <h1 class="visually-hidden" id="app-title">专注一会儿，到点起来动一动</h1>
              <p class="intro">设好间隔，小猫会准时叫你伸展、喝水、看看远处。</p>
            </div>

            <div class="timer-control-grid">
              <div class="clock-card">
                <div class="timer-ring" id="timer-ring" style="--progress: 0deg">
                  <div class="timer-face">
                    <span id="time-left">15:00</span>
                    <small>下一次提醒</small>
                  </div>
                </div>
              </div>

              <div class="action-card-grid" aria-label="休息动作建议">
                <article class="action-card">
                  <span class="action-icon icon-sprite icon-stretch" aria-hidden="true"></span>
                  <div>
                    <h2>伸懒腰</h2>
                    <p>把背拉开</p>
                  </div>
                </article>
                <article class="action-card">
                  <span class="action-icon icon-sprite icon-water" aria-hidden="true"></span>
                  <div>
                    <h2>喝水</h2>
                    <p>补一点水</p>
                  </div>
                </article>
                <article class="action-card">
                  <span class="action-icon icon-sprite icon-eyes" aria-hidden="true"></span>
                  <div>
                    <h2>远眺</h2>
                    <p>放松眼睛</p>
                  </div>
                </article>
                <article class="action-card">
                  <span class="action-icon icon-sprite icon-shoulders" aria-hidden="true"></span>
                  <div>
                    <h2>转肩</h2>
                    <p>松开肩颈</p>
                  </div>
                </article>
              </div>
            </div>

            <div class="message-card" aria-live="polite">
              <p id="next-message">该起身啦，喝口水，转转肩膀，我在这里陪你。</p>
            </div>

            <div class="settings-card">
                <div class="field-grid">
                  <div class="field-group">
                    <label for="interval-select">提醒间隔</label>
                    <div class="select-wrap">
                      <select id="interval-select">
                        <option value="5">5 分钟</option>
                        <option value="10">10 分钟</option>
                        <option value="15" selected>15 分钟</option>
                        <option value="25">25 分钟</option>
                        <option value="45">45 分钟</option>
                        <option value="custom">自定义</option>
                      </select>
                    </div>
                  </div>

                  <div class="field-group custom-field" id="custom-field" hidden>
                    <label for="custom-minutes">自定义分钟</label>
                    <input
                      id="custom-minutes"
                      type="number"
                      min="1"
                      max="240"
                      value="15"
                      inputmode="numeric"
                    />
                  </div>
                </div>

                <div class="switch-row">
                  <label class="switch">
                    <input id="voice-toggle" type="checkbox" checked />
                    <span aria-hidden="true"></span>
                    <strong>语音提醒</strong>
                  </label>
                  <label class="switch">
                    <input id="notify-toggle" type="checkbox" />
                    <span aria-hidden="true"></span>
                    <strong>通知弹窗</strong>
                  </label>
                </div>

                <div class="button-row">
                  <button class="primary-btn" id="start-btn" type="button">
                    <span class="button-dot" aria-hidden="true"></span>
                    开始
                  </button>
                </div>
              </div>
          </div>

          <aside class="companion-panel" aria-label="小猫陪伴">
            <figure class="hero-art">
              <img
                src="./assets/cat-hero.png"
                alt="橘白小猫拿着铃铛，旁边有水杯和番茄形计时器"
              />
              <figcaption id="cat-message">专注一会儿，到点起来动一动</figcaption>
            </figure>
          </aside>
        </section>

      </section>
    </main>

    <script src="./script.js?v=audio-20260615"></script>
  </body>
</html>
